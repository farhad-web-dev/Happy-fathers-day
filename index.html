<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Father's Day, Dad!</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <div class="card">
        <div class="heart-icon">❤️</div>
        <h1>Happy Father's Day!</h1>
        <p>Thank you for being my strength, my mentor, and my biggest supporter. I am so lucky to have you as my Dad.</p>
        <button onclick="showSurprise()">Click for a Surprise! 🎉</button>
    </div>

    <script>
        function showSurprise() {
            alert("Aap duniya ke sabse best Papa hain! Thank you for everything. I love you! ❤️");
        }
    </script>
</body>
</html>
